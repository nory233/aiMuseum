# Root index.html redirects into web/. The production build lives under web/
# with base URL /aiMuseum/web/ (GitHub Pages does not reliably serve a /docs folder
# from repo root for project sites).
#
# Live site: https://nory233.github.io/aiMuseum/ (redirects to …/aiMuseum/web/)
#
# Public web/ bundle is built in Actions (GITHUB_ACTIONS=true): vite strips the API key there.
# Local `vite build` + preview keeps .env unless you unset it.
name: Publish site to web

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Production build
        run: npm run build
        env:
          STRIP_OPENROUTER_KEY: '1'
          # Public URL of Cloudflare worker (repo variable). Key stays in Cloudflare only.
          VITE_OPENROUTER_GATEWAY_URL: ${{ vars.VITE_OPENROUTER_GATEWAY_URL }}

      - name: Sync dist into web/
        run: |
          rm -rf web
          mkdir -p web
          cp -r dist/* web/
          mv web/app.html web/index.html

      - name: Commit and push web/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web
          if git diff --staged --quiet; then
            echo "No changes under web/"
            exit 0
          fi
          git commit -m "chore: update published site in web [skip ci]"
          git push
