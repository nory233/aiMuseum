# GitHub Pages on many repos still uses Source = main branch / (root).
# Root index.html is only a redirect into docs/. The built app lives in docs/
# with base URL /aiMuseum/docs/ so asset paths resolve correctly.
#
# Live site: https://nory233.github.io/aiMuseum/ (redirects to …/aiMuseum/docs/)
#
# Do not pass VITE_OPENROUTER_API_KEY into this build: the output is committed to
# git and would leak the key. Use .env locally for development only.
name: Publish site to docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Production build
        run: npm run build

      - name: Sync dist into docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r dist/* docs/
          mv docs/app.html docs/index.html

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes under docs/"
            exit 0
          fi
          git commit -m "chore: update published site in docs [skip ci]"
          git push
