<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="t d">
  <title id="t">Placeholder floor map</title>
  <desc id="d">Replace this file with a real Stadsmuseet floor plan PNG or JPG, or use VITE_MUSEUM_MAP_URL.</desc>
  <rect fill="#ede6dc" width="900" height="520"/>
  <rect fill="#dcd3c4" x="48" y="48" width="804" height="424" rx="8" stroke="#b8aa97" stroke-width="2"/>
  <rect fill="#cfd9c9" opacity="0.85" x="80" y="88" width="220" height="160" rx="4" stroke="#5a7357" stroke-width="2"/>
  <rect fill="#cfe0e8" opacity="0.75" x="340" y="88" width="240" height="280" rx="4" stroke="#6a8fa0" stroke-width="2"/>
  <rect fill="#ece4d6" opacity="0.85" x="620" y="88" width="200" height="200" rx="4" stroke="#a08f74" stroke-width="2"/>
  <line x1="80" y1="320" x2="800" y2="320" stroke="#b8aa97" stroke-width="6" stroke-linecap="round"/>
  <circle cx="120" cy="168" r="12" fill="#2d7a52"/>
  <text x="140" y="174" fill="#243029" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="600">You are here - replace with venue map</text>
  <text x="80" y="380" fill="#5c534a" font-family="system-ui,Segoe UI,sans-serif" font-size="13">
    Replace <tspan font-weight="600">public/museum-map.svg</tspan> or set <tspan font-weight="600">VITE_MUSEUM_MAP_URL</tspan> in .env
  </text>
  <text x="80" y="408" fill="#7a7066" font-family="system-ui,Segoe UI,sans-serif" font-size="12">
    Published site URL: repo base path + museum-map.svg (e.g. /aiMuseum/web/museum-map.svg)
  </text>
</svg>
